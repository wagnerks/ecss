name: CI (build & tests)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

# -----------------------
# Linux & macOS matrix job
# -----------------------
jobs:
  posix-build-and-test:
    name: ${{ matrix.os }} • ${{ matrix.build_type }} • ${{ matrix.profile }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release, Debug]
        profile: [default, asan-ubsan]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ---------- Deps ----------
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-13 llvm
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew update
          brew list --formula ninja  >/dev/null 2>&1 || brew install ninja
          xcrun --find llvm-symbolizer || true
          cmake --version

      - name: Compute compiler & sanitizer flags
        id: flags
        shell: bash
        run: |
          CFLAGS=""
          CXXFLAGS=""
          LDFLAGS=""
          if [[ "${{ matrix.profile }}" == "asan-ubsan" ]]; then
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              SAN="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            else
              SAN="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            fi
            CFLAGS="$SAN"
            CXXFLAGS="$SAN"
            LDFLAGS="$SAN"
            echo "sanitizers=true" >> $GITHUB_OUTPUT
          else
            echo "sanitizers=false" >> $GITHUB_OUTPUT
          fi
          echo "cflags=$CFLAGS"   >> $GITHUB_OUTPUT
          echo "cxxflags=$CXXFLAGS" >> $GITHUB_OUTPUT
          echo "ldflags=$LDFLAGS" >> $GITHUB_OUTPUT

      - name: Find llvm-symbolizer
        id: sym
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            SYM=$(command -v llvm-symbolizer || true)
          else
            SYM=$(xcrun --find llvm-symbolizer || true)
          fi
          echo "path=${SYM}" >> $GITHUB_OUTPUT
          echo "llvm-symbolizer: ${SYM:-<not found>}"

      - name: Configure (CMake + Ninja)
        shell: bash
        env:
          CFLAGS: ${{ steps.flags.outputs.cflags }}
          CXXFLAGS: ${{ steps.flags.outputs.cxxflags }}
          LDFLAGS: ${{ steps.flags.outputs.ldflags }}
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DECSS_BUILD_TESTS=ON \
            $([ "${{ steps.flags.outputs.sanitizers }}" = "true" ] && echo "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF")

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -- -k 0

      - name: Run tests
        env:
          ASAN_SYMBOLIZER_PATH: ${{ steps.sym.outputs.path }}
          CTEST_OUTPUT_ON_FAILURE: "1"
          GTEST_COLOR: "1"
          ASAN_OPTIONS: ${{ steps.flags.outputs.sanitizers == 'true' && (runner.os == 'Linux' && 'verify_asan_link_order=0:fast_unwind_on_malloc=0:strict_string_checks=1:detect_leaks=1:check_initialization_order=1:strict_init_order=1:halt_on_error=1:abort_on_error=1:alloc_dealloc_mismatch=1:log_to_syslog=0:log_path=asan/asan' || 'verify_asan_link_order=0:fast_unwind_on_malloc=0:strict_string_checks=1:detect_leaks=0:check_initialization_order=1:strict_init_order=1:halt_on_error=1:abort_on_error=1:alloc_dealloc_mismatch=1:log_to_syslog=0:log_path=asan/asan') || '' }}
          UBSAN_OPTIONS: ${{ steps.flags.outputs.sanitizers == 'true' && 'print_stacktrace=1:halt_on_error=1:report_error_type=1' || '' }}
        run: |
          mkdir -p asan
          ctest --test-dir build --output-on-failure --build-config ${{ matrix.build_type }} --timeout 100

      - name: Upload test logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: posix-ctest-logs-${{ matrix.os }}-${{ matrix.build_type }}-${{ matrix.profile }}
          path: |
            build/Testing/Temporary/LastTest.log
            build/**/Testing/Temporary/LastTest.log

  # -----------------------
  # Windows job (MSVC)
  # -----------------------
  windows-build-and-test:
    name: windows-latest • ${{ matrix.toolchain }} • ${{ matrix.build_type }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        toolchain: [msbuild, ninja, clang-msbuild, clang-ninja]

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Install LLVM (clang-cl)
        if: contains(matrix.toolchain, 'clang')
        run: |
          choco install llvm --version=18.1.8 --no-progress
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Show compilers
        shell: pwsh
        run: |
          if ('${{ matrix.toolchain }}' -like 'clang-*') { clang-cl --version }
          cl /Bv /?
          where.exe cl
          where.exe clang-cl || echo "clang-cl not found in PATH"

      # ------------ Configure ------------
      - name: Configure (CMake • Ninja)
        if: contains(matrix.toolchain, 'ninja')
        shell: pwsh
        run: |
          $cmp='cl'
          if ('${{ matrix.toolchain }}' -eq 'clang-ninja') { $cmp='clang-cl' }
          cmake -S . -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DECSS_BUILD_TESTS=ON `
            -DCMAKE_C_COMPILER=$cmp `
            -DCMAKE_CXX_COMPILER=$cmp

      - name: Configure (CMake • Visual Studio / MSBuild)
        if: contains(matrix.toolchain, 'msbuild')
        shell: pwsh
        run: |
          $toolset=''
          if ('${{ matrix.toolchain }}' -eq 'clang-msbuild') { $toolset='-T ClangCL' }
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 $toolset `
            -DECSS_BUILD_TESTS=ON

      # ------------ Build ------------
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -- /m

      # ------------ Tests ------------
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --build-config ${{ matrix.build_type }} --timeout 100

      - name: Upload test logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-ctest-logs-${{ matrix.toolchain }}-${{ matrix.build_type }}
          path: |
            build/Testing/Temporary/LastTest.log
            build/**/Testing/Temporary/LastTest.log
